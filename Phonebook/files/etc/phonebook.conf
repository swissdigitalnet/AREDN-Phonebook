# AREDN Phonebook Configuration

# ============================================================================
# PHONEBOOK SETTINGS
# ============================================================================

# How often to fetch phonebook from servers (seconds). Default: 3600
PB_INTERVAL_SECONDS=3600

# Phonebook servers (format: host,port,path). Tried in order. Max 5 entries.
PHONEBOOK_SERVER=hb9bla-vm-tunnelserver.local.mesh,80,/filerepo/Phonebook/AREDN_Phonebook.csv
PHONEBOOK_SERVER=hb9edi-vm-gw.local.mesh,80,/filerepo/Phonebook/AREDN_Phonebook.csv

# How often to check for phonebook changes (seconds). Default: 600
STATUS_UPDATE_INTERVAL_SECONDS=600


# ============================================================================
# PHONE MONITORING
# ============================================================================

# How often to test all phones (seconds). 0 = disabled. Default: 600
PHONE_TEST_INTERVAL_SECONDS=600

# ICMP ping count per phone. 0 = disabled. Range: 0-20. Default: 5
PHONE_PING_COUNT=5

# SIP OPTIONS count per phone. 0 = disabled. Range: 0-20. Default: 5
PHONE_OPTIONS_COUNT=5

# INVITE test (rings phone). 0 = disabled, 1 = enabled. Default: 0
PHONE_CALL_TEST_ENABLED=0


# ============================================================================
# HEALTH REPORTING
# ============================================================================

# Write health to /tmp/software_health.json. 0 = disabled, 1 = enabled. Default: 1
HEALTH_LOCAL_REPORTING=1

# How often to update health file (seconds). Range: 1-3600. Default: 60
HEALTH_LOCAL_UPDATE_SECONDS=60

# Send health to remote collector. 0 = disabled, 1 = enabled. Default: 0
COLLECTOR_ENABLED=0

# Collector endpoint. Default: http://pi-collector.local.mesh:5000/ingest
COLLECTOR_URL=http://pi-collector.local.mesh:5000/ingest

# Collector timeout (seconds). Range: 1-60. Default: 10
COLLECTOR_TIMEOUT_SECONDS=10

# Send heartbeat every N hours. Range: 1-24. Default: 4
HEALTH_REPORT_BASELINE_HOURS=4

# Report if CPU changes by this much (%). Range: 1.0-100.0. Default: 20.0
HEALTH_CPU_THRESHOLD_PCT=20.0

# Report if memory increases by this much (MB). Range: 1.0-100.0. Default: 10.0
HEALTH_MEMORY_THRESHOLD_MB=10.0

# Report if health score drops by this much. Range: 1.0-100.0. Default: 15.0
HEALTH_SCORE_THRESHOLD=15.0

# Detect and report crashes. 0 = disabled, 1 = enabled. Default: 1
CRASH_REPORTING_ENABLED=1


# ============================================================================
# TOPOLOGY MAPPING
# ============================================================================

# Discover network paths via traceroute. 0 = disabled, 1 = enabled. Default: 1
NETWORK_TRACEROUTE_ENABLED=1

# Maximum traceroute hops. Range: 1-30. Default: 20
NETWORK_TRACEROUTE_MAX_HOPS=20

# Crawl mesh to discover nodes. 0 = disabled, 1 = enabled. Default: 1
TOPOLOGY_CRAWLER_ENABLED=1

# How often to crawl mesh (seconds). Range: 60-86400. Default: 3600
TOPOLOGY_CRAWLER_INTERVAL_SECONDS=3600
