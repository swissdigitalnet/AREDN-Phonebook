name: Simple IPK Build

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build-x86:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download OpenWRT SDK
        run: |
          wget -q https://downloads.openwrt.org/releases/23.05.3/targets/x86/64/openwrt-sdk-23.05.3-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          tar -xf openwrt-sdk-*.tar.xz
          mv openwrt-sdk-* sdk

      - name: Inject Package
        run: |
          rm -rf sdk/package/AREDN-Phonebook
          mkdir -p sdk/package/AREDN-Phonebook
          cp -r Phonebook/* sdk/package/AREDN-Phonebook/

      - name: Build
        run: |
          cd sdk
          make defconfig
          make package/AREDN-Phonebook/clean V=s || true
          make package/AREDN-Phonebook/compile V=s -j$(nproc)

      - name: Find IPK
        id: ipk
        run: |
          IPK=$(find sdk/bin -name "*AREDN-Phonebook*.ipk" -type f | head -n 1)
          echo "ipk_path=$IPK" >> $GITHUB_OUTPUT
          ls -lh "$IPK"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AREDN-Phonebook-x86-${{ github.ref_name }}
          path: ${{ steps.ipk.outputs.ipk_path }}
          retention-days: 90
