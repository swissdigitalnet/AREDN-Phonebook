name: Build AREDN-Phonebook IPK

on:
  push:
    tags:
      - 'test-*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        target:
          - arch: ath79
            subtarget: generic
          - arch: x86
            subtarget: 64
          - arch: ipq40xx
            subtarget: generic

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget unzip python3

      - name: Set up SDK URL
        id: sdk
        run: |
          if [[ "${{ matrix.target.arch }}" == "ath79" ]]; then
            echo "sdk_url=https://downloads.openwrt.org/releases/23.05.4/targets/ath79/generic/openwrt-sdk-23.05.4-ath79-generic_gcc-12.3.0_musl.Linux-x86_64.tar.xz" >> $GITHUB_OUTPUT
          elif [[ "${{ matrix.target.arch }}" == "ipq40xx" ]]; then
            echo "sdk_url=https://downloads.openwrt.org/releases/23.05.4/targets/ipq40xx/generic/openwrt-sdk-23.05.4-ipq40xx-generic_gcc-12.3.0_musl_eabi.Linux-x86_64.tar.xz" >> $GITHUB_OUTPUT
          else
            echo "sdk_url=https://downloads.openwrt.org/releases/23.05.4/targets/x86/64/openwrt-sdk-23.05.4-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz" >> $GITHUB_OUTPUT
          fi

      - name: Download and extract SDK
        run: |
          wget --progress=bar:force "${{ steps.sdk.outputs.sdk_url }}" -O sdk.tar.xz
          tar -xf sdk.tar.xz
          mv openwrt-sdk-* sdk

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          VERSION="${VERSION#test-}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Inject package and build
        run: |
          rm -rf sdk/package/AREDN-Phonebook
          mkdir -p sdk/package/AREDN-Phonebook
          cp -r Phonebook/* sdk/package/AREDN-Phonebook/

          cd sdk
          make defconfig
          PKG_VERSION_OVERRIDE="${{ steps.version.outputs.version }}" make package/AREDN-Phonebook/compile V=s -j$(nproc)

          IPK_FILE=$(find bin -name "*AREDN-Phonebook*.ipk" -type f | head -n 1)
          if [ -z "$IPK_FILE" ]; then
            echo "Build failed - no IPK file created"
            exit 1
          fi
          echo "Build succeeded: $IPK_FILE"
          ls -lh "$IPK_FILE"

      - name: Prepare artifact
        id: find_ipk
        run: |
          IPK_FILE=$(find sdk/bin -name "*AREDN-Phonebook*.ipk" -type f | head -n 1)
          # Map matrix arch to OpenWrt architecture name
          case "${{ matrix.target.arch }}" in
            ath79)    ARCH_NAME="mips_24kc" ;;
            ipq40xx)  ARCH_NAME="arm_cortex-a7_neon-vfpv4" ;;
            x86)      ARCH_NAME="x86_64" ;;
          esac
          ARCH_IPK="AREDN-Phonebook_${{ steps.version.outputs.version }}-1_${ARCH_NAME}.ipk"
          cp "$IPK_FILE" "$ARCH_IPK"
          echo "ipk_path=$ARCH_IPK" >> $GITHUB_OUTPUT
          echo "arch_name=$ARCH_NAME" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: AREDN-Phonebook-${{ steps.find_ipk.outputs.arch_name }}
          path: ${{ steps.find_ipk.outputs.ipk_path }}
          retention-days: 90

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Uploading IPKs to release ${{ github.ref_name }}..."
          find artifacts -name "*.ipk" -type f | while read ipk; do
            echo "Uploading: $ipk"
            gh release upload "${{ github.ref_name }}" "$ipk" --repo "${{ github.repository }}" --clobber
          done
