name: Build AREDN-Phonebook APK

on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        target:
          - arch: ath79
            subtarget: generic
          - arch: x86
            subtarget: 64
          - arch: ipq40xx
            subtarget: generic

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget unzip zstd python3

      - name: Set up SDK URL
        id: sdk
        # OpenWrt 25.12.x is the base for AREDN 4.x; toolchain gcc 14.3.0,
        # SDK tarballs are zstd-compressed (.tar.zst), packages are .apk.
        run: |
          if [[ "${{ matrix.target.arch }}" == "ath79" ]]; then
            echo "sdk_url=https://downloads.openwrt.org/releases/25.12.4/targets/ath79/generic/openwrt-sdk-25.12.4-ath79-generic_gcc-14.3.0_musl.Linux-x86_64.tar.zst" >> $GITHUB_OUTPUT
          elif [[ "${{ matrix.target.arch }}" == "ipq40xx" ]]; then
            echo "sdk_url=https://downloads.openwrt.org/releases/25.12.4/targets/ipq40xx/generic/openwrt-sdk-25.12.4-ipq40xx-generic_gcc-14.3.0_musl_eabi.Linux-x86_64.tar.zst" >> $GITHUB_OUTPUT
          else
            echo "sdk_url=https://downloads.openwrt.org/releases/25.12.4/targets/x86/64/openwrt-sdk-25.12.4-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst" >> $GITHUB_OUTPUT
          fi

      - name: Download and extract SDK
        run: |
          wget --progress=bar:force "${{ steps.sdk.outputs.sdk_url }}" -O sdk.tar.zst
          tar --zstd -xf sdk.tar.zst
          mv openwrt-sdk-* sdk

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          VERSION="${VERSION#test-}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Inject package and build
        run: |
          rm -rf sdk/package/AREDN-Phonebook
          mkdir -p sdk/package/AREDN-Phonebook
          cp -r Phonebook/* sdk/package/AREDN-Phonebook/

          cd sdk
          make defconfig
          PKG_VERSION_OVERRIDE="${{ steps.version.outputs.version }}" make package/AREDN-Phonebook/compile V=s -j$(nproc)

          APK_FILE=$(find bin -name "*AREDN-Phonebook*.apk" -type f | head -n 1)
          if [ -z "$APK_FILE" ]; then
            echo "Build failed - no APK file created"
            exit 1
          fi
          echo "Build succeeded: $APK_FILE"
          ls -lh "$APK_FILE"

      - name: Prepare artifact
        id: find_apk
        run: |
          APK_FILE=$(find sdk/bin -name "*AREDN-Phonebook*.apk" -type f | head -n 1)
          # Map matrix arch to OpenWrt architecture name
          case "${{ matrix.target.arch }}" in
            ath79)    ARCH_NAME="mips_24kc" ;;
            ipq40xx)  ARCH_NAME="arm_cortex-a7_neon-vfpv4" ;;
            x86)      ARCH_NAME="x86_64" ;;
          esac
          ARCH_APK="AREDN-Phonebook_${{ steps.version.outputs.version }}-1_${ARCH_NAME}.apk"
          cp "$APK_FILE" "$ARCH_APK"
          echo "apk_path=$ARCH_APK" >> $GITHUB_OUTPUT
          echo "arch_name=$ARCH_NAME" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: AREDN-Phonebook-${{ steps.find_apk.outputs.arch_name }}
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 90

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Uploading APKs to release ${{ github.ref_name }}..."
          find artifacts -name "*.apk" -type f | while read apk; do
            echo "Uploading: $apk"
            gh release upload "${{ github.ref_name }}" "$apk" --repo "${{ github.repository }}" --clobber
          done
